name: CI Pipeline          # 워크플로우 이름

# main 브랜치 push 또는 PR
on:                         # 트리거: 언제 실행할지
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:                       # 작업 정의
  build:
    runs-on: ubuntu-latest  # Runner 환경

    steps:                  # 실행할 단계들
      # Step 1: 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v6     # 미리 만들어진 Action 사용

      # Step 2: 커밋 해시 추출
      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          
      # Step 3: Java 17 설치
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:                          # Action에 전달할 옵션
          java-version: '17'
          distribution: 'corretto'

      # Step 4: Gradle 캐시
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 6: JAR 빌드
      - name: Build JAR
        run: ./gradlew bootJar

      # Step 7: Docker Hub 자격증명
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 8: Docker 빌드 및 push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-app:arm64